name: Runner Cache Smoke

on:
  push:
    branches:
      - task/**
  workflow_dispatch:

permissions:
  contents: read

jobs:
  smoke:
    runs-on:
      - self-hosted
      - shared
      - production

    outputs:
      store_hash: ${{ steps.push.outputs.store_hash }}
      store_path: ${{ steps.push.outputs.store_path }}

    steps:
      - name: Check out repository
        uses: actions/checkout@v5

      - name: Show runner cache environment
        run: |
          set -euo pipefail
          printf 'ATTIC_ENDPOINT=%s\n' "$ATTIC_ENDPOINT"
          printf 'ATTIC_CACHE=%s\n' "$ATTIC_CACHE"
          test -s "$ATTIC_TOKEN_FILE"

      - name: Build and push smoke path to local Attic
        id: push
        run: |
          set -euo pipefail

          attic login bootstrap-local "$ATTIC_ENDPOINT" "$(cat "$ATTIC_TOKEN_FILE")" --set-default

          out_path="$({
            nix-build --no-out-link -E '
              with import <nixpkgs> {};
              runCommand "attic-smoke-${builtins.getEnv "GITHUB_RUN_ID"}" {} ''
                mkdir -p "$out"
                printf "%s\n" "${builtins.getEnv "GITHUB_SHA"}" > "$out/commit.txt"
              ''
            '
          } | tail -n 1)"
          store_hash="$(basename "$out_path" | cut -d- -f1)"

          attic push "$ATTIC_CACHE" "$out_path"
          curl -fsSI "${ATTIC_ENDPOINT%/}/$ATTIC_CACHE/$store_hash.narinfo" >/dev/null

          printf 'store_path=%s\n' "$out_path" >> "$GITHUB_OUTPUT"
          printf 'store_hash=%s\n' "$store_hash" >> "$GITHUB_OUTPUT"

      - name: Write job summary
        run: |
          set -euo pipefail
          {
            echo "# Runner Cache Smoke"
            echo
            echo "- Store path: \`${{ steps.push.outputs.store_path }}\`"
            echo "- Narinfo: \`${ATTIC_ENDPOINT%/}/${ATTIC_CACHE}/${{ steps.push.outputs.store_hash }}.narinfo\`"
          } >> "$GITHUB_STEP_SUMMARY"
